<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC3 GS6 - Kirish</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <h1>IC3 GS6</h1>
                <p>Global Standard 6</p>
            </div>
            <form id="loginForm">
                <h2>Kirish</h2>
                <div class="input-group">
                    <label for="fish">F.I.SH:</label>
                    <input type="text" id="fish" name="FISH" required>
                </div>
                <div class="input-group">
                    <label for="email">Gmail:</label>
                    <input type="email" id="email" name="Gmail" required>
                </div>
                <div class="input-group">
                    <label for="username">Login:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Parol:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Kirish</button>
                <div class="demo-info">
                    <p>Demo: ****** / *****</p>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
